map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Upstream pools — Docker DNS resolves to all replicas
upstream frontend_pool {
    server frontend:3000;
    # With docker compose scale: frontend=N, Docker DNS round-robins
    # For sticky sessions (not needed — JWT is stateless):
    # ip_hash;
}

upstream backend_pool {
    server backend:8000;
}

server {
    listen 80;

    # Security headers (ASVS V14.4)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; frame-src 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Increase max upload size for file storage
    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml;
    gzip_min_length 1000;

    # Nginx health check (for external LB / k8s)
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # WebSocket channels → backend (real-time pub/sub)
    # WebSocket channels → backend (real-time pub/sub via CueStack protocol)
    location /ws/channels {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # WebSocket MQTT → Mosquitto broker (mqtt.js connects here)
    location /ws/mqtt {
        proxy_pass http://mqtt:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Channel publish + stats → backend
    location /api/channels/publish {
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/channels/stats {
        proxy_pass http://backend_pool;
    }

    # MQTT management → backend (dynsec sync, disconnect)
    location /api/mqtt/ {
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    # Data events API → backend (ClickHouse queries + export)
    location /api/v1/ {
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    # API requests → FastAPI backend pool
    location /api/pipeline/ {
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Backend health check
    location /api/health {
        proxy_pass http://backend_pool;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # Jupyter — full WebSocket support for kernels + events
    location /jupyter/ {
        proxy_pass http://jupyter:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # Everything else → Next.js frontend pool
    location / {
        proxy_pass http://frontend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}
