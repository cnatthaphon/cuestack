services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot123}
      POSTGRES_DB: ${POSTGRES_DB:-iotstack}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-iot}:${POSTGRES_PASSWORD:-iot123}@db:5432/${POSTGRES_DB:-iotstack}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      JUPYTER_URL: http://jupyter:8888
      SCHEDULER_POLL_INTERVAL: ${SCHEDULER_POLL_INTERVAL:-60}
      MQTT_BROKER: mqtt
      MQTT_PORT: 1883
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: cuestack
      CLICKHOUSE_USER: cuestack
      CLICKHOUSE_PASSWORD: cuestack123
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
      clickhouse:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    # Scale: docker compose up --scale backend=N
    # Advisory lock ensures only 1 replica runs cron at a time

  frontend:
    build: ./frontend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-iot}:${POSTGRES_PASSWORD:-iot123}@db:5432/${POSTGRES_DB:-iotstack}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      BACKEND_URL: http://backend:8000
      FILES_ROOT: /files
      SEED_DATA: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - org_files:/files
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3
    # Scale: docker compose up --scale frontend=N
    # Stateless — JWT auth works across instances

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1884:1883"
      - "9002:9001"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -W 2 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  jupyter:
    build: ./jupyter
    environment:
      DATABASE_URL: postgresql://jupyter_user:${JUPYTER_DB_PASSWORD:-jupyter_readonly_123}@db:5432/${POSTGRES_DB:-iotstack}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - jupyter_workspaces:/workspace
      - org_files:/files:ro

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      CLICKHOUSE_DB: cuestack
      CLICKHOUSE_USER: cuestack
      CLICKHOUSE_PASSWORD: cuestack123
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
      - jupyter
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/nginx-health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
  jupyter_workspaces:
  org_files:
  mqtt_data:
  clickhouse_data:
