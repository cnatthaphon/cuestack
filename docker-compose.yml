services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot123}
      POSTGRES_DB: ${POSTGRES_DB:-iotstack}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-iot}:${POSTGRES_PASSWORD:-iot123}@db:5432/${POSTGRES_DB:-iotstack}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-iot}:${POSTGRES_PASSWORD:-iot123}@db:5432/${POSTGRES_DB:-iotstack}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      BACKEND_URL: http://backend:8000
      FILES_ROOT: /files
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
      - org_files:/files

  jupyter:
    build: ./jupyter
    environment:
      # Restricted user — can only access org data tables, NOT system/config tables
      DATABASE_URL: postgresql://jupyter_user:${JUPYTER_DB_PASSWORD:-jupyter_readonly_123}@db:5432/${POSTGRES_DB:-iotstack}
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-dev-jupyter-token}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - jupyter_workspaces:/workspace
      - org_files:/files:ro

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
      - jupyter
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

volumes:
  pgdata:
  jupyter_workspaces:
  org_files:
